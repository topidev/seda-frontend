<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEDA - Sin conexión</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0F172A;
      color: #F9FAFB;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: #1E293B;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
    }

    p {
      font-size: 14px;
      color: #9CA3AF;
      max-width: 280px;
      line-height: 1.6;
    }

    button {
      margin-top: 8px;
      padding: 12px 24px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2">
      <path
        d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" />
    </svg>
  </div>
  <h1>Sin conexión</h1>
  <p>No hay internet. Cuando recuperes la conexión, tus cambios guardados se sincronizarán automáticamente.</p>
  <button onclick="window.location.reload()">Reintentar</button>
</body>

</html>
